<style>
*,*::before,*::after{box-sizing:border-box;font-family:'Poppins',sans-serif;margin:0;padding:0;}
body{background:#FFFBF5;color:#2D2A26;overscroll-behavior-y:none;}
html{overscroll-behavior-y:none;}

/* Diwali gold top strip */
.diwali-strip{position:fixed;top:0;left:0;right:0;height:4px;z-index:9999;
  background:linear-gradient(90deg,#02514F 0%,#D4AF37 40%,#FBAE25 60%,#D4AF37 80%,#02514F 100%);}

@keyframes checkPop{0%{transform:scale(0) rotate(-15deg);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes diwaGlow{
  0%,100%{box-shadow:0 0 0 3px rgba(212,175,55,0.32),0 8px 24px rgba(2,81,79,0.1)}
  50%{box-shadow:0 0 0 3px rgba(212,175,55,0.55),0 12px 32px rgba(2,81,79,0.18)}
}
@keyframes sectionReveal{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}

.check-pop{animation:checkPop 0.3s cubic-bezier(.34,1.56,.64,1) both}
.fade-up{animation:fadeUp 0.4s ease both}
.section-reveal{animation:sectionReveal 0.45s ease both}

/* Card states */
.sel-card{transition:transform 0.2s cubic-bezier(.34,1.2,.64,1),box-shadow 0.2s ease,border-color 0.2s ease;cursor:pointer;}
.sel-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,175,55,0.18),0 2px 8px rgba(0,0,0,0.04)!important;}
.sel-card.selected{animation:diwaGlow 2.5s ease infinite;}

.snack-card{transition:transform 0.18s ease,box-shadow 0.18s ease;cursor:pointer;}
.snack-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(212,175,55,0.2)!important;}

/* Occasion photo cards */
.occ-card{cursor:pointer;border-radius:16px;overflow:hidden;
  transition:transform 0.22s ease,box-shadow 0.22s ease;position:relative;}
.occ-card:hover{transform:translateY(-5px);box-shadow:0 20px 55px rgba(0,0,0,0.24),0 0 0 1px rgba(212,175,55,0.35)!important;}
.occ-card.selected{animation:diwaGlow 2.5s ease infinite;}

.prog-dot{transition:background 0.3s ease;}
.cat-tab{transition:all 0.15s ease;white-space:nowrap;}

/* Hero bg — dark teal + rangoli diamonds */
.rangoli-bg{
  background-color:#0D2B28;
  background-image:
    radial-gradient(ellipse 70% 60% at 50% 42%,rgba(212,175,55,0.13) 0%,transparent 66%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L55 30L30 55L5 30z' stroke='%23D4AF37' stroke-opacity='0.06' stroke-width='1' fill='none'/%3E%3Ccircle cx='30' cy='30' r='2.5' fill='%23D4AF37' fill-opacity='0.05'/%3E%3Ccircle cx='30' cy='5' r='1.5' fill='%23D4AF37' fill-opacity='0.07'/%3E%3Ccircle cx='30' cy='55' r='1.5' fill='%23D4AF37' fill-opacity='0.07'/%3E%3Ccircle cx='5' cy='30' r='1.5' fill='%23D4AF37' fill-opacity='0.07'/%3E%3Ccircle cx='55' cy='30' r='1.5' fill='%23D4AF37' fill-opacity='0.07'/%3E%3C/svg%3E");
}

/* Config / review page — warm cream + faint paisley */
.page-bg{
  background-color:#FFFBF5;
  background-image:url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cellipse cx='60' cy='60' rx='22' ry='38' fill='none' stroke='%23D4AF37' stroke-opacity='0.04' stroke-width='1.5' transform='rotate(25 60 60)'/%3E%3Cellipse cx='60' cy='60' rx='16' ry='28' fill='none' stroke='%2371B8A6' stroke-opacity='0.03' stroke-width='1' transform='rotate(-20 60 60)'/%3E%3Ccircle cx='60' cy='60' r='3' fill='%23D4AF37' fill-opacity='0.032'/%3E%3Ccircle cx='20' cy='20' r='1.5' fill='%2371B8A6' fill-opacity='0.025'/%3E%3Ccircle cx='100' cy='100' r='1.5' fill='%2371B8A6' fill-opacity='0.025'/%3E%3C/svg%3E");
}

input,textarea{font-family:'Poppins',sans-serif;}
input:focus,textarea:focus{outline:none;border-color:#02514F!important;box-shadow:0 0 0 3px rgba(2,81,79,0.08)!important;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:#D4AF37;border-radius:3px;}
::-webkit-scrollbar-track{background:transparent;}
@media(max-width:900px){.desktop-sidebar{display:none!important;}}
@media(max-width:900px){.mobile-bar{display:flex!important;}}
.mobile-stepper{display:none;}
@media(max-width:900px){.mobile-stepper{display:flex!important;}}

/* Hamper photo strip marquee */
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.photo-strip{overflow:hidden;width:100%;position:relative;}
.photo-strip::before,.photo-strip::after{content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2;pointer-events:none;}
.photo-strip::before{left:0;background:linear-gradient(90deg,#0D2B28,transparent);}
.photo-strip::after{right:0;background:linear-gradient(-90deg,#0D2B28,transparent);}
.photo-track{display:flex;gap:14px;width:max-content;animation:marquee 42s linear infinite;}
.photo-track:hover{animation-play-state:paused;}
.photo-track img{height:220px;width:auto;border-radius:14px;object-fit:cover;flex-shrink:0;
  box-shadow:0 8px 28px rgba(0,0,0,0.35);transition:transform 0.3s ease;}
.photo-track img:hover{transform:scale(1.04);}

/* Brand marquee */
.brand-strip{overflow:hidden;width:100%;position:relative;}
.brand-strip::before,.brand-strip::after{content:'';position:absolute;top:0;bottom:0;width:100px;z-index:2;pointer-events:none;}
.brand-strip::before{left:0;background:linear-gradient(90deg,#0D2B28,transparent);}
.brand-strip::after{right:0;background:linear-gradient(-90deg,#0D2B28,transparent);}
.brand-track{display:flex;gap:16px;width:max-content;animation:marquee 38s linear infinite;}
.brand-track:hover{animation-play-state:paused;}
.brand-tile{display:flex;align-items:center;justify-content:center;
  background:#fff;border-radius:14px;padding:14px 28px;
  height:76px;min-width:150px;flex-shrink:0;
  box-shadow:0 2px 12px rgba(0,0,0,0.14);
  transition:transform 0.2s,box-shadow 0.2s;}
.brand-tile:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.2);}
.brand-tile img{max-height:38px;max-width:120px;object-fit:contain;opacity:0.88;transition:opacity 0.2s;}
.brand-tile:hover img{opacity:1;}
.brand-tile span{color:#5a6b6a;font-weight:600;font-size:13px;white-space:nowrap;}

@media(max-width:600px){.occ-grid{grid-template-columns:1fr 1fr!important;}}
@media(max-width:860px){.hero-split{flex-direction:column!important;padding:24px 20px 40px!important;}.hero-img-col{display:none!important;}}
@media(max-width:860px){.why-grid{grid-template-columns:1fr 1fr!important;}}
@media(max-width:500px){.why-grid{grid-template-columns:1fr!important;}}

/* ── Mobile responsive ── */
@media(max-width:540px){
  /* Review form: 2-col → 1-col */
  .form-grid{grid-template-columns:1fr!important;}
  /* Bottom CTA: full-width */
  .bottom-cta-btn{width:100%!important;padding:15px 24px!important;}
  /* Sticky headers: tighter padding + fix logo/button overlap */
  .sticky-hdr-inner{padding:10px 14px!important;justify-content:space-between!important;}
  .sticky-hdr-logo{position:static!important;transform:none!important;height:32px!important;}
  .review-sticky-hdr{padding:10px 14px!important;}
  /* Landing top bar: reduce padding */
  .landing-top-bar{padding:14px 18px!important;}
  /* Why-grid column items: tighter padding */
  .why-col{padding:0 16px!important;}
  .why-section{padding:40px 20px!important;}
  .why-hdr{margin-bottom:32px!important;}
  .why-h2{font-size:26px!important;line-height:1.3!important;letter-spacing:-0.5px!important;}
  /* Review page body: tighter padding */
  .review-page-inner{padding:24px 14px!important;}
}
.h-scroll-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;}
.h-scroll-row::-webkit-scrollbar{display:none;}
.h-scroll-row .snack-card{width:148px!important;min-width:148px;max-width:148px;flex-shrink:0;}

/* Inline warning banners */
.warn-banner{display:flex;align-items:flex-start;gap:10px;border-radius:12px;padding:12px 14px;
  margin-bottom:16px;animation:fadeUp 0.3s ease both;font-size:13px;line-height:1.45;}
.warn-banner-over{background:#FFF0EE;border:1.5px solid #F4A261;border-left:4px solid #E76F51;}
.warn-banner-full{background:#FFFAE8;border:1.5px solid #F4C842;border-left:4px solid #FBAE25;}
.warn-cta{display:inline-block;margin-top:6px;padding:4px 12px;border-radius:20px;
  font-size:11px;font-weight:700;cursor:pointer;border:none;transition:opacity 0.15s;}
.warn-cta:hover{opacity:0.8;}

/* Stepper buttons */
.step-btn{width:26px;height:26px;border-radius:50%;border:none;display:flex;
  align-items:center;justify-content:center;font-size:15px;font-weight:800;
  cursor:pointer;flex-shrink:0;transition:transform 0.1s,background 0.15s;}
.step-btn:active{transform:scale(0.88);}
.step-btn:disabled{cursor:not-allowed;opacity:0.45;}
</style>
</head>

/* ── HELPERS ── */
function calcCosts(cfg){
  const as=0; // add-ons are TBD (Price on request)
  const pp=0;
  const bs=(cfg.branding||[]).reduce((s,id)=>{const x=BRANDING.find(v=>v.id===id);return s+(x?x.p:0);},0);
  const ps=0;
  const ss=Object.entries(cfg.snackQtys||{}).reduce((s,[id,qty])=>{const x=SNACKS.find(v=>v.id===id);return s+(x?x.p*(qty||0):0);},0);
  const lg=50;
  const actual=ss+bs+lg;
  const customQty=parseInt(cfg.customQuantity)||0;
  const qty=cfg.quantity==='qcustom' ? customQty : (QUANTITIES.find(v=>v.id===cfg.quantity)||{mid:250}).mid;
  return{ss,as,pp,bs,ps,lg,actual,budMax:0,budLabel:null,overBudget:false,oLo:actual*qty,oHi:Math.round(actual*qty*1.15),qty};
}
function fmtINR(n){
  if(n>=10000000)return`₹${(n/10000000).toFixed(1)}Cr`;
  if(n>=100000) return`₹${(n/100000).toFixed(2)}L`;
  return`₹${n.toLocaleString('en-IN')}`;
}
const completedFields={
  quantity:   (v,cfg)=>v && (v!=='qcustom' || !!(cfg&&parseInt(cfg.customQuantity)>0)),
  hamperSize: (v)=>!!v,
  snackQtys:  (v)=>v&&Object.values(v).some(q=>q>0),
  addons:     ()=>true,
  branding:   ()=>true,
};
function countCompleted(cfg){
  return Object.keys(completedFields).filter(k=>completedFields[k](cfg[k],cfg)).length;
}

  const handleSummaryClick=()=>{
    if(totalSnackQty===0){setSnackWarn(true);setTimeout(()=>setSnackWarn(false),5000);return;}
    const isCustom=!cfg.hamperSize||cfg.hamperSize==='custombox';
    if(!isCustom&&totalSnackQty<minSlots){setSlotWarn(true);setTimeout(()=>setSlotWarn(false),6000);}
    else{setDrawerOpen(true);}
  };

  // Live cost for budget enforcement
  const snacksCostLive=Object.entries(snackQtys).reduce((s,[id,qty])=>{const x=SNACKS.find(v=>v.id===id);return s+(x?x.p*(qty||0):0);},0);
  const brandingCostLive=(cfg.branding||[]).reduce((s,id)=>{const x=BRANDING.find(v=>v.id===id);return s+(x?x.p:0);},0);
  const totalPerHamperLive=snacksCostLive+brandingCostLive;
  const isOverBudget=false;

  const canAdd=(id)=>{
    const currentQty=snackQtys[id]||0;
    if(currentQty>=5)return false;
    if(totalOccupied>=slots&&currentQty===0)return false;
    return true;
  };

  const setSnackQty=(id,delta)=>{
    const current=snackQtys[id]||0;
    const next=Math.max(0,current+delta);
    if(delta>0&&!canAdd(id)){return;}
    const newQtys={...snackQtys};
    if(next===0)delete newQtys[id];
    else newQtys[id]=next;
    set('snackQtys',newQtys);
  };

  const toggleArr=(key,arr,id)=>{
    arr.includes(id)?set(key,arr.filter(x=>x!==id)):set(key,[...arr,id]);
  };
  const visSnacks=snackCat==='Diwali Best Sellers'?SNACKS.filter(s=>s.bs):snackCat==='All'?SNACKS:SNACKS.filter(s=>s.cat===snackCat);

  const snCard=(sn)=>{
    const snQty=snackQtys[sn.id]||0;
    const isSel=snQty>0;
    const addOk=canAdd(sn.id);
    return(
      <div key={sn.id} className="snack-card"
        style={{background:isSel?'linear-gradient(145deg,#024240,#02514F)':'#fff',
          border:`2px solid ${isSel?G:'rgba(0,0,0,0.07)'}`,borderRadius:14,
          overflow:'hidden',position:'relative',
          display:'flex',flexDirection:'column',
          boxShadow:isSel?`0 0 0 3px rgba(212,175,55,0.22),0 6px 20px rgba(2,81,79,0.18)`
            :'0 2px 10px rgba(0,0,0,0.04)'}}>
        <div style={{height:155,background:'#f0ede8',overflow:'hidden',position:'relative',flexShrink:0}}>
          <img src={sn.img} alt={sn.n} loading="lazy" decoding="async"
            style={{width:'100%',height:'100%',objectFit:'cover'}}
            onError={e=>{e.target.style.display='none';}}/>
          {isSel&&<div className="check-pop" style={{position:'absolute',top:6,right:6,
            background:`linear-gradient(135deg,${GOLD},#c9a227)`,borderRadius:'50%',
            width:20,height:20,display:'flex',alignItems:'center',justifyContent:'center',
            fontSize:10,color:'#fff',fontWeight:800}}>✓</div>}
          {sn.pop&&!isSel&&snackCat!=='Diwali Best Sellers'&&<div style={{position:'absolute',top:6,left:6,
            background:M,color:'#fff',fontSize:9,fontWeight:700,
            padding:'2px 6px',borderRadius:20}}>✦ Loved</div>}
          <div style={{position:'absolute',bottom:5,left:6,
            background:'rgba(0,0,0,0.45)',color:'rgba(255,255,255,0.9)',
            fontSize:9,fontWeight:600,padding:'1px 6px',borderRadius:8}}>
            {sn.w}
          </div>
        </div>
        <div style={{padding:'9px 11px 11px',display:'flex',flexDirection:'column',flex:1}}>
          <div style={{fontWeight:600,fontSize:10,padding:'2px 7px',borderRadius:20,
            background:isSel?'rgba(255,255,255,0.13)':'rgba(2,81,79,0.07)',
            color:isSel?'rgba(255,255,255,0.8)':G,display:'inline-block',marginBottom:4}}>{sn.cat}</div>
          <div style={{fontWeight:600,fontSize:12,lineHeight:1.35,
            flex:1,marginBottom:9,color:isSel?'#fff':'#1E1A18'}}>{sn.n}</div>
          {isSel?(
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
              background:'rgba(255,255,255,0.1)',borderRadius:8,padding:'3px 5px'}}>
              <button className="step-btn"
                onClick={e=>{e.stopPropagation();setSnackQty(sn.id,-1);}}
                style={{background:'rgba(255,255,255,0.18)',color:'#fff'}}>−</button>
              <span style={{fontWeight:800,fontSize:14,color:'#fff',minWidth:18,textAlign:'center'}}>{snQty}</span>
              <button className="step-btn"
                onClick={e=>{e.stopPropagation();setSnackQty(sn.id,1);}}
                disabled={!addOk}
                title={!addOk?(boxFull?'Box is full':'Budget limit reached'):'Add one more'}
                style={{background:addOk?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.12)',
                  color:addOk?'#fff':'#9ca3af'}}>+</button>
            </div>
          ):(
            <button
              onClick={e=>{e.stopPropagation();setSnackQty(sn.id,1);}}
              disabled={!addOk}
              style={{width:'100%',background:addOk?G:'#e5e7eb',
                color:addOk?'#fff':'#9ca3af',border:'none',borderRadius:8,
                padding:'6px',fontSize:11,fontWeight:600,
                cursor:addOk?'pointer':'not-allowed',
                transition:'background 0.15s'}}>
              {addOk?'Add +':boxFull?'Box Full':'At limit'}
            </button>
          )}
        </div>
      </div>
    );
  };

  return(
    <div className="page-bg" style={{minHeight:'100vh',paddingBottom:100}}>
      {/* Sticky header (offset 4px for gold strip) */}
      <div style={{position:'sticky',top:4,zIndex:100,
        background:'rgba(255,251,245,0.96)',backdropFilter:'blur(14px)',
        borderBottom:`1px solid rgba(212,175,55,0.14)`}}>
        <div className="sticky-hdr-inner" style={{padding:'11px 28px',display:'flex',alignItems:'center',justifyContent:'flex-end',position:'relative'}}>
        <img src={LOGO} alt="Snackible" onClick={onHome} className="sticky-hdr-logo"
          style={{height:40,cursor:'pointer',display:'block',
            position:'absolute',left:'50%',transform:'translateX(-50%)'}}/>
        <button onClick={handleSummaryClick}
          style={{background:G,color:'#fff',border:'none',borderRadius:50,
            padding:'9px 22px',fontSize:14,fontWeight:600,cursor:'pointer',
            boxShadow:`0 4px 12px rgba(2,81,79,0.24)`,transition:'background 0.18s'}}
          onMouseEnter={e=>e.currentTarget.style.background='#013d3b'}
          onMouseLeave={e=>e.currentTarget.style.background=G}>
          See Summary →
        </button>
        </div>
      </div>

      <HeroBanner/>

      <div style={{maxWidth:1280,margin:'0 auto',display:'flex',alignItems:'flex-start'}}>
        <StepperSidebar cfg={cfg}/>
        <div style={{flex:1,minWidth:0,padding:'36px 24px 0'}}>
        {/* Page intro */}
        <div style={{marginBottom:36}}>
          <div style={{fontSize:13,fontWeight:600,color:M,marginBottom:7,
            display:'flex',alignItems:'center',gap:6}}>
            🪔 Snackible Diwali 2026 |Corporate Gifting
          </div>
          <h1 style={{fontSize:'clamp(22px,3vw,34px)',fontWeight:900,color:'#1E1A18',
            letterSpacing:'-0.8px',marginBottom:10}}>BUILD YOUR OWN CUSTOMISED DIWALI HAMPER</h1>
          <p style={{fontSize:'clamp(13px,1.2vw,16px)',color:'#6b7280',fontWeight:400,lineHeight:1.6,margin:0,maxWidth:640}}>

          <div>

            {/* ── 1 QUANTITY ── */}

                  const sel=cfg.quantity===q.id;

                    <Card key={q.id} sel={sel} onClick={()=>set('quantity',q.id)}>
                      {q.custom?(
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
                          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={sel?M:'#9ca3af'} strokeWidth="2" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                          <span style={{fontSize:16,fontWeight:800,color:sel?M:'#1E1A18'}}>Custom</span>
                        </div>
                      ):(
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                          <span style={{fontSize:22,fontWeight:900,letterSpacing:'-0.8px',
                            color:sel?M:'#1E1A18'}}>{q.l}</span>
                          <div style={{display:'flex',flexDirection:'column',gap:4}}>
                            {q.badge&&<Pop label={q.badge} bg={G} tc="#fff"/>}
                            {q.popular&&<Pop label="Most Popular"/>}
                          </div>
                        </div>
                      )}
                      <div style={{fontSize:12,color:'#7A7168'}}>{q.custom?'Enter exact number':'Hampers'}</div>
                    </Card>
                  );

              </div>
              {/* Custom quantity input */}
              {cfg.quantity==='qcustom'&&(
                <div style={{marginTop:14,display:'flex',alignItems:'center',gap:10,
                  background:'#fff',borderRadius:14,padding:'14px 18px',
                  border:`2px solid ${GOLD}`,boxShadow:'0 4px 16px rgba(212,175,55,0.12)'}}>
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={M} strokeWidth="2" strokeLinecap="round"><path d="M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z"/><path d="M16 3v4M8 3v4"/></svg>
                  <input type="number" min="1" placeholder="e.g. 750"
                    value={cfg.customQuantity||''}
                    onChange={e=>set('customQuantity',e.target.value)}
                    style={{flex:1,border:'none',background:'transparent',fontSize:18,fontWeight:700,
                      color:M,outline:'none',width:'100%'}}/>
                  <span style={{fontSize:13,color:'#9ca3af',flexShrink:0}}>Hampers</span>
                </div>
              )}
              <p style={{color:'#9ca3af',fontSize:12,marginTop:10}}>Not sure? Pick the closest. We confirm before production.</p>
            </Sec>

            {/* ── 2 HAMPER SIZE ── */}
            <Sec num={2} title="Choose your hamper"
              sub=""
              done={!!cfg.hamperSize}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(220px,1fr))',gap:16}}>
                {SIZES.map(h=>{
                  const sel=cfg.hamperSize===h.id;
                  return(
                    <Card key={h.id} sel={sel} onClick={()=>set('hamperSize',h.id)}
                      style={{padding:0,overflow:'hidden'}} noCheck>
                      {/* Photo */}
                      <div style={{height:175,overflow:'hidden',position:'relative',flexShrink:0,
                        background:`linear-gradient(135deg,${M}22,${GOLD}33)`}}>
                        <img src={h.img} alt={h.n} loading="lazy" decoding="async"
                          style={{width:'100%',height:'100%',objectFit:'cover',objectPosition:'center top',display:'block'}}/>
                        <div style={{position:'absolute',inset:0,
                          background:'linear-gradient(180deg,transparent 50%,rgba(0,0,0,0.28))',pointerEvents:'none'}}/>
                        {h.star&&<div style={{position:'absolute',top:10,right:10,zIndex:2,
                          background:M,color:'#fff',fontSize:10,fontWeight:700,
                          padding:'3px 10px',borderRadius:20}}>✦ Most Popular</div>}
                        {sel&&<div className="check-pop" style={{position:'absolute',top:10,left:10,zIndex:2,
                          background:`linear-gradient(135deg,${GOLD},#c9a227)`,borderRadius:'50%',
                          width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',
                          fontSize:12,color:'#fff',fontWeight:800,
                          boxShadow:'0 2px 8px rgba(212,175,55,0.5)'}}>✓</div>}
                      </div>
                      {/* Text panel */}
                      <div style={{padding:'12px 14px',
                        background:sel?'#FFFBF0':'#fff',
                        borderTop:`1px solid ${sel?'rgba(212,175,55,0.25)':'rgba(0,0,0,0.05)'}`}}>
                        <div style={{fontWeight:700,fontSize:13,color:sel?M:'#1E1A18',marginBottom:2}}>{h.n}</div>
                        <div style={{fontSize:13,color:'#7A7168',marginBottom:8}}>{h.cap}</div>
                        <span style={{fontSize:16,fontWeight:800,padding:'8px 18px',borderRadius:24,
                          whiteSpace:'nowrap',display:'inline-block',
                          background:G,color:'#fff',
                          boxShadow:'0 3px 10px rgba(2,81,79,0.35)'}}>{h.price}</span>
                      </div>
                    </Card>
                  );
                })}
              </div>
            </Sec>

            {/* ── 3 SNACKS ── */}
            <Sec num={3} title="Curate from our range of snacks"
              sub=""
              done={Object.values(snackQtys).some(q=>q>0)}
              locked={!cfg.hamperSize}>
              {/* Slot fill bar */}
              <div style={{background:'#fff',borderRadius:12,padding:'12px 16px',marginBottom:16,
                border:`1.5px solid ${belowMin?'rgba(220,38,38,0.25)':(atMin||boxFull)?'rgba(22,163,74,0.25)':'rgba(212,175,55,0.2)'}`,
                display:'flex',alignItems:'center',gap:12}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:'#1E1A18',marginBottom:6,display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                    <span>{totalSnackQty} snacks selected</span>
                    {minSlots>0&&<span style={{fontSize:11,color:'#9ca3af',fontWeight:400}}>· min {minSlots}, max {slots}</span>}
                    {boxFull&&<span style={{fontSize:11,fontWeight:600,background:'#16a34a',color:'#fff',padding:'1px 8px',borderRadius:20}}>Box Full ✓</span>}
                    {atMin&&<span style={{fontSize:11,fontWeight:600,background:'#16a34a',color:'#fff',padding:'1px 8px',borderRadius:20}}>Min reached ✓</span>}
                    {belowMin&&<span style={{fontSize:11,fontWeight:600,background:'#dc2626',color:'#fff',padding:'1px 8px',borderRadius:20}}>Need {minSlots-totalSnackQty} more</span>}
                  </div>
                  {/* Progress bar with min marker */}
                  <div style={{height:8,background:'rgba(0,0,0,0.07)',borderRadius:4,position:'relative'}}>
                    <div style={{height:'100%',width:`${pct}%`,borderRadius:4,transition:'width 0.3s ease',
                      background:belowMin?'linear-gradient(90deg,#ef4444,#f87171)':'linear-gradient(90deg,#16a34a,#4ade80)'}}/>
                    {minSlots>0&&minSlots<slots&&(
                      <div style={{position:'absolute',top:-3,bottom:-3,left:`${minPct}%`,
                        width:2,background:'#6b7280',borderRadius:2,transform:'translateX(-50%)'}}
                        title={`Minimum: ${minSlots} snacks`}/>
                    )}
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',marginTop:5,fontSize:11,color:'#9ca3af'}}>
                    <span>0</span>
                    {minSlots>0&&minSlots<slots&&<span style={{position:'relative',left:`${minPct-50}%`,color:'#6b7280',fontWeight:600}}>min {minSlots}</span>}
                    <span>{slots}</span>
                  </div>
                </div>
              </div>

              {/* ── Inline warning banners ── */}
              {boxFull&&!isOverBudget&&(
                <div className="warn-banner warn-banner-full">
                  <span style={{fontSize:18,flexShrink:0}}>📦</span>
                  <div>
                    <div style={{fontWeight:700,color:'#7B4F00',marginBottom:2}}>
                      Box is full: {slots} slots filled
                    </div>
                    <div style={{fontSize:12,color:'#8B6200',lineHeight:1.4}}>
                      All slots are taken. Upgrade to a larger hamper to add more variety.
                    </div>
                    <button className="warn-cta"
                      style={{background:'rgba(212,175,55,0.15)',color:'#7B4F00',marginTop:7}}
                      onClick={()=>{const el=document.getElementById('sec-2');el&&el.scrollIntoView({behavior:'smooth',block:'start'});}}>
                      Upgrade hamper →
                    </button>
                  </div>
                </div>
              )}

              {/* Category tabs */}
              <div style={{display:'flex',gap:7,overflowX:'auto',paddingBottom:8,marginBottom:16}}>
                {CAT_TABS.map(c=>(
                  <button key={c} onClick={()=>setSnackCat(c)} className="cat-tab"
                    style={{flexShrink:0,
                      background:snackCat===c?M:'#fff',
                      color:snackCat===c?'#fff':'#6b7280',
                      border:`1.5px solid ${snackCat===c?M:'rgba(0,0,0,0.1)'}`,
                      borderRadius:50,padding:'6px 16px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
                    {c}
                  </button>
                ))}
              </div>

              {/* Snack display */}
              {(snackCat==='Diwali Best Sellers'||( isMobile&&snackCat==='All'))?(
                <div>
                  {CAT_TABS.filter(c=>c!=='All'&&c!=='Diwali Best Sellers').map(cat=>{
                    const catSnacks=snackCat==='Diwali Best Sellers'
                      ?SNACKS.filter(s=>s.bs&&s.cat===cat)
                      :SNACKS.filter(s=>s.cat===cat);
                    if(!catSnacks.length) return null;
                    return(
                      <div key={cat} style={{marginBottom:24}}>
                        <div style={{fontWeight:700,fontSize:13,color:'#1E1A18',marginBottom:8,
                          paddingBottom:6,borderBottom:'1px solid rgba(0,0,0,0.07)',
                          display:'flex',alignItems:'center',gap:6}}>
                          {cat}
                        </div>
                        <div className="h-scroll-row">
                          {catSnacks.map(sn=>snCard(sn))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              ):(
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:10}}>
                  {visSnacks.map(sn=>snCard(sn))}
                </div>
              )}
            </Sec>

            {/* ── 4 ADD-ONS ── */}
            <Sec num={4} title="Elevate the hamper"
              sub="" optional={true}
              done={true}>
              {boxFull&&totalSnackQty>=slots&&(
                <div style={{display:'flex',alignItems:'center',gap:12,
                  background:'#FFF8E1',border:'1.5px solid #F5C842',borderRadius:12,
                  padding:'12px 16px',marginBottom:14}}>
                  <span style={{fontSize:18,flexShrink:0}}>🎒</span>
                  <div style={{fontSize:13,color:'#7B4F00',fontWeight:500,lineHeight:1.4}}>
                    <strong>Your snack slots are full.</strong> Remove a snack above to make room for add-ons.
                  </div>
                </div>
              )}
              {boxFull&&totalSnackQty<slots&&(
                <div style={{display:'flex',alignItems:'center',gap:12,
                  background:'#E8F5E9',border:'1.5px solid #66BB6A',borderRadius:12,
                  padding:'12px 16px',marginBottom:14}}>
                  <span style={{fontSize:18,flexShrink:0}}>✓</span>
                  <div style={{fontSize:13,color:'#1B5E20',fontWeight:500,lineHeight:1.4}}>
                    <strong>Your box is full.</strong> You've perfectly packed your hamper 🪔
                  </div>

                        position:'relative',
                        boxShadow:isSel?`0 0 0 3px rgba(2,81,79,0.18),0 8px 24px rgba(2,81,79,0.12)`:'0 2px 12px rgba(0,0,0,0.04)',
                        cursor:'pointer',transition:'all 0.2s',
                      }}>
                      {isSel&&<div style={{position:'absolute',top:10,right:10,
                        background:`linear-gradient(135deg,${GOLD},#c9a227)`,borderRadius:'50%',
                        width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:11,color:'#fff',fontWeight:800,boxShadow:'0 2px 8px rgba(212,175,55,0.5)'}}>✓</div>}
                      <div style={{width:68,height:68,borderRadius:'50%',overflow:'hidden',
                        margin:'0 auto 12px',
                        border:`2.5px solid ${isSel?'rgba(255,255,255,0.3)':'rgba(212,175,55,0.25)'}`,
                        boxShadow:'0 2px 8px rgba(0,0,0,0.08)',
                        background:a.imgBg||`linear-gradient(135deg,${M},${GOLD})`}}>
                        <img src={a.img} alt={a.n} loading="lazy"
                          style={{width:'100%',height:'100%',objectFit:a.imgFit||'cover',objectPosition:a.imgPos||'center center'}}

                      </div>
                      <div style={{fontWeight:700,fontSize:12,color:isSel?'#fff':'#1E1A18',marginBottom:6,lineHeight:1.3}}>{a.n}</div>
                      <div style={{fontSize:11,color:isSel?'rgba(255,255,255,0.6)':'#9ca3af',fontStyle:'italic'}}>
                        {isSel?'Selected':'Tap to add'}
                      </div>
                      {a.pop&&<div style={{display:'flex',justifyContent:'center',marginTop:6}}>
                        <Pop label="Most Loved"/>
                      </div>}
                    </div>

              {/* Procure CTA */}
              <div style={{marginTop:16,background:'linear-gradient(135deg,#FDF6E3,#FFF8EC)',
                border:`1.5px solid rgba(212,175,55,0.35)`,borderRadius:16,
                padding:'16px 20px',display:'flex',alignItems:'center',gap:14}}>

                  <div style={{fontWeight:700,fontSize:14,color:M,marginBottom:3}}>

                  </div>
                  <div style={{fontSize:12,color:'#7A7168',lineHeight:1.5}}>

                  </div>

              </div>
            </Sec>

            {/* ── 5 BRANDING ── */}
            <Sec num={5} title="Custom Personalisation"
              sub="Stack options to create an unforgettable branded gifting experience."
              done={true}>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))',gap:10}}>
                {BRANDING.map(b=>{
                  const s=selBranding.includes(b.id);
                  return(
                    <Card key={b.id} sel={s}
                      onClick={()=>toggleArr('branding',selBranding,b.id)}
                      style={{padding:b.img?0:15,overflow:'hidden'}} noCheck>
                      {b.img?(
                        <>
                          <div style={{position:'relative',height:88,overflow:'hidden',flexShrink:0}}>

};

const Review=({cfg,onSubmit,onBack})=>{
  const [form,setForm]=useState({company:'',name:'',email:'',phone:'',req:''});
  const [submitting,setSubmitting]=useState(false);
  const [touched,setTouched]=useState({});
  const c=calcCosts(cfg);
  const validEmail=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email.trim());
  const validPhone=/^(\+91[\s\-]?)?[6-9]\d{9}$/.test(form.phone.trim().replace(/[\s\-]/g,''));
  const canSub=form.company.trim()&&validEmail&&validPhone;
  const touch=(k)=>setTouched(p=>({...p,[k]:true}));

  const handleSubmit=async()=>{
    setTouched({company:true,email:true,phone:true});
    if(!canSub||submitting)return;
    setSubmitting(true);
    const payload={
      submitted_at:    new Date().toLocaleString('en-IN',{timeZone:'Asia/Kolkata'}),
      company:         form.company,
      contact_name:    form.name,
      email:           form.email,
      phone:           form.phone,
      special_requirements: form.req,
      quantity:        cfg.quantity==='qcustom'?(cfg.customQuantity+' hampers (custom)'):(QUANTITIES.find(v=>v.id===cfg.quantity)||{l:'-'}).l+' hampers',
      hamper_size:     (SIZES.find(v=>v.id===cfg.hamperSize)||{n:'-'}).n,
      snacks_count:    Object.values(cfg.snackQtys||{}).reduce((a,b)=>a+(b||0),0),
      snacks:          Object.entries(cfg.snackQtys||{}).filter(([,q])=>q>0).map(([id,q])=>{const s=SNACKS.find(v=>v.id===id);return s?`${s.n} ×${q}`:null;}).filter(Boolean).join(', ')||'None',
      addons:          (cfg.addons||[]).map(id=>(ADDONS.find(v=>v.id===id)||{}).n).filter(Boolean).join(', ')||'None',
      branding:        (cfg.branding||[]).map(id=>(BRANDING.find(v=>v.id===id)||{}).n).filter(Boolean).join(', ')||'None',
      est_per_hamper:  c.actual>0?`₹${c.actual}/hamper`:'-',
      est_total:       c.oLo>0?fmtINR(c.oLo)+' – '+fmtINR(c.oHi):'-',
    };
    if(SHEET_ENDPOINT&&SHEET_ENDPOINT!=='PASTE_YOUR_APPS_SCRIPT_URL_HERE'){
      try{
        await fetch(SHEET_ENDPOINT,{method:'POST',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});

📦 *Hamper:* ${lbl(SIZES,cfg.hamperSize,'n')||'-'}

🎨 *Branding:* ${brandingLabel}
🎁 *Add-ons:* ${addonsLabel}

*Company:* ${form.company||'-'}
*Email:* ${form.email||'-'}
*Phone:* ${form.phone||'-'}${form.req?`\n*Special requirements:* ${form.req}`:''}

Can you share next steps? 🪔`;

              : (<><svg width="18" height="18" viewBox="0 0 32 32" fill="none">
                  <path d="M23.5 8.5A10.44 10.44 0 0 0 16 5.5C10.753 5.5 6.5 9.753 6.5 15a9.44 9.44 0 0 0 1.37 4.9L6.5 26.5l6.77-1.35A9.5 9.5 0 0 0 16 25.5c5.247 0 9.5-4.253 9.5-9.5a9.44 9.44 0 0 0-2-6z" fill={canSub?'#fff':'#9ca3af'}/>
                  <path d="M21.07 18.11c-.3-.15-1.75-.86-2.02-.96-.27-.1-.47-.15-.67.15-.2.3-.77.96-.94 1.16-.17.2-.35.22-.65.07a8.2 8.2 0 0 1-2.4-1.48 9 9 0 0 1-1.66-2.07c-.17-.3-.02-.46.13-.6.13-.13.3-.35.45-.52.15-.17.2-.3.3-.5.1-.2.05-.37-.02-.52-.08-.15-.67-1.62-.92-2.22-.24-.58-.49-.5-.67-.51h-.57c-.2 0-.52.07-.79.37-.27.3-1.03 1.01-1.03 2.46s1.05 2.85 1.2 3.05c.15.2 2.07 3.16 5.01 4.43.7.3 1.25.48 1.67.62.7.22 1.34.19 1.84.12.56-.09 1.75-.72 2-1.41.25-.69.25-1.28.17-1.41-.07-.13-.27-.2-.57-.35z" fill={canSub?'#25D366':'#9ca3af'}/>
                </svg>Place Order</>)
            }
          </button>
        </div>
      </div>
    </div>
  );
};

/* ── SUCCESS ── */
const Success=({cfg,form})=>{
  const qtyLabel=cfg.quantity==='qcustom'
    ?(cfg.customQuantity?`${parseInt(cfg.customQuantity).toLocaleString('en-IN')} hampers (custom)`:'Custom')
    :(QUANTITIES.find(v=>v.id===cfg.quantity)||{l:'-'}).l+' hampers';
  const hamperName=(SIZES.find(v=>v.id===cfg.hamperSize)||{n:'-'}).n;
  const snacksList=Object.entries(cfg.snackQtys||{}).filter(([,q])=>q>0)
    .map(([id,q])=>{const s=SNACKS.find(v=>v.id===id);return s?{n:s.n,q,cat:s.cat,w:s.w}:null;}).filter(Boolean);
  const addonsList=(cfg.addons||[]).map(id=>(ADDONS.find(v=>v.id===id)||{}).n).filter(Boolean);
  const brandingList=(cfg.branding||[]).map(id=>(BRANDING.find(v=>v.id===id)||{}).n).filter(Boolean);
  const c=calcCosts(cfg);
  const today=new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  const f=form||{};

  const downloadPDF=()=>{
    const esc=function(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});};
    const totalSnacks=snacksList.reduce(function(a,s){return a+s.q;},0);
    const snacksHTML=snacksList.length
      ?'<ul>'+snacksList.map(function(s){return '<li><strong>'+esc(s.n)+'</strong>'+(s.q>1?' &times; '+s.q:'')+' <span style="color:#7A7168;">&mdash; '+esc(s.cat)+', '+esc(s.w)+'</span></li>';}).join('')+'</ul>'
      :'<div style="font-size:12px;color:#9ca3af;">None selected</div>';
    const addonsHTML=addonsList.length
      ?'<ul>'+addonsList.map(function(a){return '<li>'+esc(a)+'</li>';}).join('')+'</ul>'
      :'<div style="font-size:12px;color:#9ca3af;">None selected</div>';
    const brandingHTML=brandingList.length
      ?'<ul>'+brandingList.map(function(b){return '<li>'+esc(b)+'</li>';}).join('')+'</ul>'
      :'<div style="font-size:12px;color:#9ca3af;">None selected</div>';
    const reqHTML=f.req?'<h2>Special Requirements</h2><div style="font-size:12px;background:#FFFBF5;border-left:3px solid #D4AF37;padding:10px 12px;border-radius:4px;">'+esc(f.req)+'</div>':'';
    const perH=c.actual>0?'&#8377;'+c.actual:'On request';
    const totalEst=c.oLo>0?fmtINR(c.oLo)+' – '+fmtINR(c.oHi):'On request';
    const css='@page{size:A4;margin:18mm 16mm;}*{box-sizing:border-box;}'
      +'body{font-family:Arial,sans-serif;color:#1E1A18;margin:0;padding:0;line-height:1.5;}'
      +'.header{border-bottom:3px solid #02514F;padding-bottom:14px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-end;}'
      +'.brand{font-size:26px;font-weight:900;color:#02514F;letter-spacing:-0.5px;}'
      +'.brand small{display:block;font-size:12px;color:#02514F;font-weight:600;margin-top:2px;letter-spacing:1px;text-transform:uppercase;}'
      +'.meta{text-align:right;font-size:11px;color:#7A7168;}'
      +'h1{font-size:22px;color:#02514F;margin:0 0 6px;font-weight:800;}'
      +'h2{font-size:14px;color:#02514F;margin:22px 0 10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;border-bottom:1px solid rgba(212,175,55,0.4);padding-bottom:6px;}'
      +'.tagline{color:#7A7168;font-size:13px;margin-bottom:18px;}'
      +'.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 24px;font-size:12px;}'
      +'.row{padding:6px 0;border-bottom:1px dotted rgba(0,0,0,0.08);display:flex;justify-content:space-between;gap:12px;}'
      +'.row .lbl{color:#7A7168;} .row .val{font-weight:600;text-align:right;}'
      +'ul{margin:6px 0 0;padding-left:18px;font-size:12px;} ul li{margin-bottom:3px;}'
      +'.totals{background:#FDF6E3;border:1.5px solid rgba(212,175,55,0.4);border-radius:10px;padding:14px 18px;margin-top:16px;}'
      +'.totals .line{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}'
      +'.totals .grand{font-size:16px;font-weight:800;color:#02514F;border-top:1.5px solid rgba(2,81,79,0.2);padding-top:10px;margin-top:6px;}'
      +'.footer{margin-top:30px;padding-top:14px;border-top:1px solid rgba(0,0,0,0.08);font-size:11px;color:#9ca3af;text-align:center;line-height:1.6;}'
      +'.cta{background:#02514F;color:#fff;padding:10px 14px;border-radius:8px;font-size:12px;margin-top:14px;}'
      +'.cta strong{color:#FBAE25;}';
    const body='<div class="header"><div class="brand">Snackible<small>Mu(n)ch Better</small></div>'
      +'<div class="meta">Quote date: '+esc(today)+'<br/>diwali.snackible.in</div></div>'
      +'<h1>Your Diwali Hamper Proposal</h1>'
      +'<div class="tagline">A festive gifting summary prepared for '+esc(f.company||'your team')+'.</div>'
      +'<h2>Contact</h2><div class="grid">'
      +'<div class="row"><span class="lbl">Company</span><span class="val">'+esc(f.company||'-')+'</span></div>'
      +'<div class="row"><span class="lbl">Contact</span><span class="val">'+esc(f.name||'-')+'</span></div>'
      +'<div class="row"><span class="lbl">Email</span><span class="val">'+esc(f.email||'-')+'</span></div>'
      +'<div class="row"><span class="lbl">Phone</span><span class="val">'+esc(f.phone||'-')+'</span></div></div>'
      +'<h2>Configuration</h2><div class="grid">'
      +'<div class="row"><span class="lbl">Quantity</span><span class="val">'+esc(qtyLabel)+'</span></div>'
      +'<div class="row"><span class="lbl">Hamper</span><span class="val">'+esc(hamperName)+'</span></div>'
      +'<div class="row"><span class="lbl">Snacks selected</span><span class="val">'+totalSnacks+'</span></div>'
      +'<div class="row"><span class="lbl">Add-ons</span><span class="val">'+addonsList.length+'</span></div></div>'
      +'<h2>Snacks ('+totalSnacks+')</h2>'+snacksHTML
      +'<h2>Add-ons</h2>'+addonsHTML
      +'<h2>Custom Personalisation</h2>'+brandingHTML
      +reqHTML
      +'<div class="totals">'
      +'<div class="line"><span>Est. per hamper</span><span>'+perH+'</span></div>'
      +'<div class="line"><span>Hampers</span><span>'+esc(qtyLabel)+'</span></div>'
      +'<div class="line grand"><span>Estimated total</span><span>'+totalEst+'</span></div>'
      +'<div style="font-size:10px;color:#7A7168;margin-top:8px;">Final pricing will be confirmed in our detailed proposal within 24 hours. Add-ons are quoted separately.</div></div>'
      +'<div class="cta">Our gifting team will reach out within 24 hours with a <strong>detailed proposal</strong> tailored to your requirements. Questions? WhatsApp <strong>+91 77100 00176</strong>.</div>'
      +'<div class="footer">Snackible &middot; Mu(n)ch Better &middot; Diwali Corporate Gifting 2026<br/>This is an indicative quote generated from diwali.snackible.in</div>';
    const closeScript='<'+'/script>';
    const html='<!doctype html><html><head><meta charset="utf-8"/><title>Snackible Diwali Hamper - '+esc(f.company||'Proposal')+'</title><style>'+css+'</style></head><body>'+body
      +'<script>window.onload=function(){setTimeout(function(){window.print();},250);};'+closeScript+'</body></html>';
    const w=window.open('','_blank');
    if(!w){alert('Please allow pop-ups to download your summary PDF.');return;}
    w.document.open();w.document.write(html);w.document.close();
  };

  return(
  <div className="rangoli-bg" style={{minHeight:'100vh',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',padding:'40px 24px',textAlign:'center'}}>
    <div style={{width:80,height:80,borderRadius:'50%',background:`linear-gradient(135deg,${GOLD},#c9a227)`,
      display:'flex',alignItems:'center',justifyContent:'center',marginBottom:20,
      boxShadow:'0 8px 32px rgba(212,175,55,0.45)'}}>
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 style={{color:'#fff',fontSize:'clamp(28px,5vw,50px)',fontWeight:900,
      margin:'0 0 14px',letterSpacing:'-1px'}}>You're all set! 🪔</h1>
    <p style={{color:'rgba(255,255,255,0.7)',fontSize:17,maxWidth:540,lineHeight:1.65,marginBottom:40}}>
      Our gifting team will reach out within 24 hours with a detailed proposal tailored to your requirements.
    </p>
    <div style={{display:'flex',gap:16,flexWrap:'wrap',justifyContent:'center',marginBottom:44}}>
      {[
        ['Hampers',qtyLabel.replace(' hampers','').replace(' (custom)','')],
        ['Hamper',hamperName],
      ].map(([l,v])=>(
        <div key={l} style={{background:'rgba(255,255,255,0.08)',borderRadius:14,
          padding:'14px 22px',minWidth:130,border:'1px solid rgba(255,255,255,0.1)'}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',fontWeight:500,marginBottom:3,
            textTransform:'uppercase',letterSpacing:'0.5px'}}>{l}</div>
          <div style={{fontSize:17,fontWeight:800,color:GOLD}}>{v}</div>
        </div>
      ))}
    </div>
    <button onClick={downloadPDF}
      style={{background:GOLD,color:'#1E1A18',
        border:'none',borderRadius:50,
        padding:'14px 30px',fontSize:14,fontWeight:700,cursor:'pointer',
        boxShadow:'0 8px 24px rgba(212,175,55,0.35)',
        transition:'transform 0.15s'}}
      onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px)'}
      onMouseLeave={e=>e.currentTarget.style.transform='translateY(0)'}>
      ⬇ Download Summary PDF
    </button>
    <p style={{color:'rgba(255,255,255,0.4)',fontSize:11,marginTop:12,maxWidth:400}}>
      Tip: in the print dialog, select "Save as PDF" as the destination.
    </p>
  </div>
  );
};

/* ── APP ── */
function App(){
  const [screen,setScreen]=useState(0);
  const [vis,setVis]=useState(true);
  const [cfg,setCfg]=useState({
    quantity:null,hamperSize:null,
    snackQtys:{},addons:[],branding:[],
    customQuantity:'',
  });
  const set=(k,v)=>setCfg(p=>({...p,[k]:v}));
  const go=n=>{
    setVis(false);
    setTimeout(()=>{setScreen(n);setVis(true);window.scrollTo({top:0,behavior:'smooth'});},200);
  };
  const wrap={opacity:vis?1:0,transform:vis?'translateY(0)':'translateY(8px)',
    transition:'opacity 0.2s ease,transform 0.2s ease'};
  return(
    <>
      {/* Diwali gold top strip — fixed, always visible */}
      <div className="diwali-strip"/>
      <div style={wrap}>
        {screen===0?<Landing onStart={()=>go(1)}/>:
         screen===3?<Success cfg={cfg} form={cfg.contact}/>:
         screen===2?<Review cfg={cfg} onBack={()=>go(1)} onSubmit={fd=>{setCfg(p=>({...p,contact:fd}));go(3);}}/>:
         <ConfigPage cfg={cfg} set={set} onSummary={()=>go(2)} onHome={()=>go(0)}/>}
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
